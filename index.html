<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Me</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <button id="beerBtn" class="beer-button">
        BEER ME
    </button>

    <p class="tagline">
        Because the best beer is the one nearby.
    </p>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Finding beer...</p>
    </div>

    <div id="result" class="hidden">

        <h2 id="breweryName"></h2>

        <p id="distance"></p>

        <div class="beerCard">

            <h3>Recommended Beer</h3>

            <p id="beerName"></p>

        </div>

        <div class="buttonGroup">

            <button id="differentBeerBtn">
                🍻 Different Beer
            </button>

            <button id="differentPlaceBtn">
                📍 Somewhere Else
            </button>

            <button id="directionsBtn">
                🗺️ Directions
            </button>
             <a
            class="suggestion-button"
            href="mailto:joe@joeinit.com?subject=Beer%20Me%20Suggestion"
    >
            💡 Make a Suggestion
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
